# Route ALSA's default PCM and control through PipeWire instead of opening the
# raw hardware device directly. With this, every ALSA app in the container
# cooperates with PipeWire (sharing the sound card) rather than opening /dev/snd
# exclusively and evicting PipeWire -- which drops the host to the `auto_null`
# dummy sink and silences ALL audio, including the Claude stop-hook beep.
#
# The pipewire ALSA plugin (libasound_module_pcm_pipewire.so) lives in the
# pipewire output, not alsa-lib's, so docker.nix points ALSA_PLUGIN_DIR at a
# merged plugin dir that includes it.
#
# MIDI is unaffected: aconnect/amidi/aseqdump use the ALSA sequencer/rawmidi
# (kernel /dev/snd/seq), not these PCM/CTL plugins.
pcm.!default {
    type pipewire
}
ctl.!default {
    type pipewire
}
